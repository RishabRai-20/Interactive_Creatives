    function detectswipe(el, func) {



      swipe_det = new Object();
      swipe_det.sX = 0;
      swipe_det.sY = 0;
      swipe_det.eX = 0;
      swipe_det.eY = 0;
      var min_x = 20; //min x swipe for horizontal swipe
      var max_x = 40; //max x difference for vertical swipe
      var min_y = 40; //min y swipe for vertical swipe
      var max_y = 50; //max y difference for horizontal swipe
      var direc = "";

      ele = document.getElementById(el);
      ele.addEventListener('touchstart', function(e) {
        //direc = "s";
        touchmoved = false;
        var t = e.touches[0];
        swipe_det.sX = t.screenX;
        swipe_det.sY = t.screenY;
      }, false);
      ele.addEventListener('touchmove', function(e) {
        e.preventDefault();
        //direc = "m";
        touchmoved = true;
        var t = e.touches[0];
        swipe_det.eX = t.screenX;
        swipe_det.eY = t.screenY;
      }, false);
      ele.addEventListener('touchend', function(e) {
        //horizontal detection
        if (touchmoved == true) {



          //alert(touchmoved + " == touchmoved");
          angleDeg = Math.atan2(swipe_det.eY - swipe_det.sY, swipe_det.eX - swipe_det.sX) * 180 / Math.PI;
          //alert("angleDeg == "+angleDeg);
          console.log(swipe_det.eX + " == swipe_det.eX");
          console.log(swipe_det.sX + " == swipe_det.sX")
          console.log(swipe_det.eY + " == swipe_det.eY")
          console.log(swipe_det.sY + " == swipe_det.sY")
          var diffX = Number(swipe_det.eX) - Number(swipe_det.sX);
          var diffY = Number(swipe_det.eY) - Number(swipe_det.sY)
          distanceToSwipe = Math.sqrt(Math.pow(diffX, 2) + Math.pow(diffY, 2));
          console.log(distanceToSwipe + " == distanceToSwipe..")
          direc = distanceToSwipe;

          /*           dartCount--;
                  document.getElementById('DotCount_1').innerHTML = "<b>" + dartCount + "</b>"; */


        }
        //vertical detection
        /*  
        if ((((swipe_det.eY - min_y > swipe_det.sY) || (swipe_det.eY + min_y < swipe_det.sY)) && ((swipe_det.eX < swipe_det.sX + max_x) && (swipe_det.sX > swipe_det.eX - max_x)))) {
                if(swipe_det.eY > swipe_det.sY) direc = "d";
                else direc = "u";
              } 
              */

        if (direc != "") {
          if (typeof func == 'function') func(el, direc, -angleDeg);
        }
        direc = "";
      }, false);
    }
