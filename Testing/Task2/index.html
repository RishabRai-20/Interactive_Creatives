<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AR Home Exploration</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/webxr/ARButton.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body{
margin:0;
overflow:hidden;
font-family:Arial;
}

#message{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
background:rgba(0,0,0,0.6);
color:#fff;
padding:10px 20px;
border-radius:20px;
}
</style>
</head>

<body>

<div id="message">Tap on floor to place house</div>

<script>

let scene, camera, renderer;
let controller;
let reticle;

let house;
let glass;
let juice;

let raycaster = new THREE.Raycaster();
let mouse = new THREE.Vector2();

init();
animate();

function init(){

scene = new THREE.Scene();

camera = new THREE.PerspectiveCamera(
70,
window.innerWidth/window.innerHeight,
0.01,
20
);

renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
renderer.xr.enabled = true;

document.body.appendChild(renderer.domElement);

document.body.appendChild(ARButton.createButton(renderer,{
requiredFeatures:['hit-test']
}));

let light = new THREE.HemisphereLight(0xffffff,0xbbbbff,1);
scene.add(light);

controller = renderer.xr.getController(0);
controller.addEventListener("select", onSelect);
scene.add(controller);

const geometry = new THREE.RingGeometry(0.15,0.2,32).rotateX(-Math.PI/2);

reticle = new THREE.Mesh(
geometry,
new THREE.MeshBasicMaterial()
);

reticle.matrixAutoUpdate = false;
reticle.visible = false;

scene.add(reticle);

}

function createHouse(){

house = new THREE.Group();

let floor = new THREE.Mesh(
new THREE.BoxGeometry(1,0.02,1),
new THREE.MeshStandardMaterial({color:0xf0f0f0})
);

house.add(floor);

let table = new THREE.Mesh(
new THREE.BoxGeometry(0.3,0.02,0.2),
new THREE.MeshStandardMaterial({color:0x8b5a2b})
);

table.position.set(0,0.15,0);
house.add(table);

let legGeo = new THREE.BoxGeometry(0.02,0.15,0.02);

for(let i=0;i<4;i++){

let leg = new THREE.Mesh(
legGeo,
new THREE.MeshStandardMaterial({color:0x8b5a2b})
);

leg.position.set(
(i<2?-0.12:0.12),
0.07,
(i%2?-0.08:0.08)
);

house.add(leg);
}

let juicePack = new THREE.Mesh(
new THREE.BoxGeometry(0.05,0.12,0.05),
new THREE.MeshStandardMaterial({color:0xff6600})
);

juicePack.position.set(-0.05,0.22,0);
juicePack.name="juice";
house.add(juicePack);

glass = new THREE.Mesh(
new THREE.CylinderGeometry(0.03,0.03,0.1,32,1,true),
new THREE.MeshStandardMaterial({
color:0xffffff,
transparent:true,
opacity:0.3
})
);

glass.position.set(0.05,0.2,0);
house.add(glass);

juice = new THREE.Mesh(
new THREE.CylinderGeometry(0.028,0.028,0.001,32),
new THREE.MeshStandardMaterial({color:0xff8c00})
);

juice.position.set(0.05,0.15,0);
house.add(juice);

scene.add(house);

}

function onSelect(){

if(reticle.visible && !house){

createHouse();

house.position.setFromMatrixPosition(reticle.matrix);

$("#message").text("Tap the juice pack");

return;
}

if(house){

raycaster.setFromCamera(mouse,camera);

let intersects = raycaster.intersectObjects(house.children);

if(intersects.length>0){

if(intersects[0].object.name=="juice"){

fillGlass();

}

}

}

}

function fillGlass(){

let level = 0;

let fillInterval = setInterval(function(){

level += 0.002;

juice.scale.y = level*50;

juice.position.y = 0.15 + level/2;

if(level >= 0.1){

clearInterval(fillInterval);

}

},30);

}

function animate(){

renderer.setAnimationLoop(render);

}

function render(timestamp, frame){

if(frame){

const referenceSpace = renderer.xr.getReferenceSpace();
const session = renderer.xr.getSession();

if(!hitTestSourceRequested){

session.requestReferenceSpace('viewer').then(function(referenceSpace){

session.requestHitTestSource({space:referenceSpace}).then(function(source){

hitTestSource = source;

});

});

hitTestSourceRequested = true;

session.addEventListener('end', function(){

hitTestSourceRequested = false;
hitTestSource = null;

});

}

if(hitTestSource){

const hitTestResults = frame.getHitTestResults(hitTestSource);

if(hitTestResults.length){

const hit = hitTestResults[0];

reticle.visible = true;

reticle.matrix.fromArray(
hit.getPose(referenceSpace).transform.matrix
);

}else{

reticle.visible = false;

}

}

}

renderer.render(scene,camera);

}

let hitTestSource = null;
let hitTestSourceRequested = false;

window.addEventListener("click", function(event){

mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

});

</script>

</body>
</html>
