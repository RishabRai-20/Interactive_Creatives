<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realistic Tilt Liquid Glass</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>
body {
    margin: 0;
    height: 100vh;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    font-family: sans-serif;
}

.wrapper {
    perspective: 1200px;
}

.glass {
    width: 220px;
    height: 320px;
    border: 5px solid rgba(255,255,255,0.6);
    border-radius: 25px 25px 50px 50px;
    position: relative;
    overflow: hidden;
    transform-style: preserve-3d;
    background: rgba(255,255,255,0.05);
}

canvas {
    position: absolute;
    bottom: 0;
    left: 0;
}

.instructions {
    position: absolute;
    bottom: 20px;
    color: white;
    font-size: 14px;
    opacity: 0.6;
}
</style>
</head>

<body>

<div class="wrapper">
    <div class="glass">
        <canvas id="liquidCanvas" width="220" height="320"></canvas>
    </div>
</div>

<div class="instructions">
Tilt phone or move mouse (desktop fallback)
</div>

<script>
$(function(){

const canvas = document.getElementById("liquidCanvas");
const ctx = canvas.getContext("2d");

let width = canvas.width;
let height = canvas.height;

let liquidLevel = height * 0.6;
let targetTiltX = 0;
let targetTiltY = 0;
let currentTiltX = 0;
let currentTiltY = 0;

let waveOffset = 0;
let waveVelocity = 0;

const maxTilt = 30;
const drinkAngle = 25;

// Smooth physics animation
function animate(){

    currentTiltX += (targetTiltX - currentTiltX) * 0.08;
    currentTiltY += (targetTiltY - currentTiltY) * 0.08;

    $(".glass").css("transform",
        `rotateX(${currentTiltX}deg) rotateY(${currentTiltY}deg)`
    );

    waveVelocity += currentTiltY * 0.002;
    waveVelocity *= 0.95;
    waveOffset += waveVelocity;

    ctx.clearRect(0,0,width,height);

    ctx.beginPath();
    ctx.moveTo(0, height);

    for(let x = 0; x <= width; x++){
        let waveHeight = Math.sin((x * 0.05) + waveOffset) * 8;
        ctx.lineTo(x, liquidLevel + waveHeight);
    }

    ctx.lineTo(width, height);
    ctx.closePath();

    let gradient = ctx.createLinearGradient(0, liquidLevel, 0, height);
    gradient.addColorStop(0, "#4fc3f7");
    gradient.addColorStop(1, "#01579b");

    ctx.fillStyle = gradient;
    ctx.fill();

    // Drinking effect
    if(currentTiltX > drinkAngle && liquidLevel < height - 20){
        liquidLevel += 0.5;
    }

    requestAnimationFrame(animate);
}

animate();

/* ---------- MOBILE TILT ---------- */
if(window.DeviceOrientationEvent){
    window.addEventListener("deviceorientation", function(e){
        targetTiltX = e.beta / 3;
        targetTiltY = e.gamma / 3;

        targetTiltX = Math.max(-maxTilt, Math.min(maxTilt, targetTiltX));
        targetTiltY = Math.max(-maxTilt, Math.min(maxTilt, targetTiltY));
    });
}

/* ---------- DESKTOP FALLBACK ---------- */
$(document).on("mousemove", function(e){
    let x = (e.clientX / window.innerWidth - 0.5) * 2;
    let y = (e.clientY / window.innerHeight - 0.5) * 2;

    targetTiltY = x * maxTilt;
    targetTiltX = y * maxTilt;
});

});
</script>

</body>
</html>
