<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Liquid Glass</title>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#111;
    font-family:Arial;
}

/* Glass */
.glass{
    width:180px;
    height:300px;
    border:4px solid #fff;
    border-radius:0 0 40px 40px;
    position:relative;
    overflow:hidden;
}

/* Liquid */
.liquid{
    position:absolute;
    bottom:0;
    width:100%;
    height:70%;
    background:linear-gradient(#00d4ff,#008cff);
    transition:height 0.3s;
}

/* Liquid surface wave */
.wave{
    position:absolute;
    top:-20px;
    left:0;
    width:200%;
    height:40px;
    background:rgba(255,255,255,0.3);
    border-radius:50%;
    animation:waveMove 4s infinite linear;
}

@keyframes waveMove{
    from{ transform:translateX(0);}
    to{ transform:translateX(-50%);}
}

</style>
</head>

<body>

<div class="glass">

    <div class="liquid">
        <div class="wave"></div>
    </div>

</div>

<script>

$(document).ready(function(){

let liquid = $(".liquid");
let level = 70;
let tiltValue = 0;

/* ---------- MOBILE DEVICE TILT ---------- */

if (window.DeviceOrientationEvent){

window.addEventListener("deviceorientation",function(event){

let tilt = event.gamma; // left-right tilt

tiltValue = tilt;

moveLiquid(tilt);

});

}

/* ---------- DESKTOP FALLBACK (MOUSE) ---------- */

$(document).mousemove(function(e){

let width = $(window).width();
let center = width/2;

let tilt = (e.pageX - center)/20;

tiltValue = tilt;

moveLiquid(tilt);

});


/* ---------- LIQUID MOVEMENT FUNCTION ---------- */

function moveLiquid(tilt){

let rotate = tilt/3;

$(".wave").css({
transform: "rotate("+rotate+"deg)"
});


/* Drinking simulation */

if(Math.abs(tilt) > 30){

level -= 0.2;

if(level < 5){
level = 5;
}

liquid.css("height", level+"%");

}

}

});

</script>

</body>
</html>
